name: koto
description: A tablet-first Android study app.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  sqflite: ^2.3.3
  pdfrx: ^1.0.60
  google_mlkit_text_recognition: ^0.13.0
  http: ^1.2.1
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  uuid: ^4.4.0
  go_router: ^14.2.0
  fl_chart: ^0.68.0
  workmanager: ^0.9.0+3
  google_fonts: ^6.2.1
  path: ^1.9.0
  file_picker: ^10.3.10
  open_filex: ^4.7.0
  sqflite_common_ffi: ^2.4.0+2
  sqflite_common_ffi_web: ^1.1.1
  flutter_markdown: ^0.7.1
  markdown: ^7.2.2
  flutter_math_fork: ^0.7.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
